<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy 23rd Birthday, Nathan!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
    rel="stylesheet"
  />

  <!--
  ════════════════════════════════════════════════════════
   REQUIRED LOCAL ASSETS (same folder as this index.html)
  ════════════════════════════════════════════════════════
   Sprites:
     nathan.png   luxray.png
     amanda.png   misa.png      ariel.png    san.png
     shannon.png  brandon.png   bri.png      jackie.png
     liz.png      mel.png       jenna.png    yingying.png
     taylor.png   brian.png     alex.png

   Audio:
     amanda.mp3   misa.mp3      ariel.mp3    san.mp3
     shannon.mp3  brandon.mp3   bri.mp3      jackie.mp3
     liz.mp3      mel.mp3       jenna.mp3    yingying.mp3
     taylor.mp3   brian.mp3     alex.mp3

   Transcripts (optional — fallback shown if missing):
     transcript_amanda.txt    transcript_misa.txt
     transcript_ariel.txt     transcript_san.txt
     transcript_shannon.txt   transcript_brandon.txt
     transcript_bri.txt       transcript_jackie.txt
     transcript_liz.txt       transcript_mel.txt
     transcript_jenna.txt     transcript_yingying.txt
     transcript_taylor.txt    transcript_brian.txt
     transcript_alex.txt
  ════════════════════════════════════════════════════════
  -->

  <style>
    /* ── RESET ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── DESIGN TOKENS ── */
    :root {
      --bg-deep:      #0a0820;
      --bg-dark:      #0f0d2e;
      --bg-panel:     #141038;
      --bg-dialogue:  #1a1555;
      --border-outer: #1e1550;
      --border-inner: #4455cc;
      --border-hi:    #6677ee;
      --accent-blue:  #4488ff;
      --accent-purple:#7755dd;
      --accent-light: #bb88ff;
      --text-main:    #ddd4ff;
      --text-dim:     #7766aa;
      --cursor-color: #ffe066;
      --shadow:       #06040f;
      --font:         'Press Start 2P', monospace;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      background: var(--bg-deep);
      font-family: var(--font);
      color: var(--text-main);
      overflow-x: hidden;
    }

    /* ── GAME COLUMN (phone-width centered on desktop) ── */
    #game {
      position: relative;
      width: 100%;
      max-width: 420px;
      min-height: 100vh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      z-index: 1;
    }

    /* ── STAR FIELD (CSS-only, no canvas) ── */
    #stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .star {
      position: absolute;
      border-radius: 50%;
      background: #fff;
      animation: twinkle var(--dur, 3s) ease-in-out infinite var(--delay, 0s);
    }
    @keyframes twinkle {
      0%, 100% { opacity: var(--lo, 0.1); }
      50%       { opacity: var(--hi, 0.8); }
    }

    /* pixel sparkles ✦ */
    .sparkle {
      position: fixed;
      font-size: 10px;
      color: var(--accent-light);
      pointer-events: none;
      z-index: 0;
      animation: sparkle-pop var(--dur, 3s) ease-in-out infinite var(--delay, 0s);
      opacity: 0;
    }
    @keyframes sparkle-pop {
      0%   { opacity: 0; transform: scale(0.4) rotate(0deg); }
      40%  { opacity: 0.7; transform: scale(1.1) rotate(120deg); }
      100% { opacity: 0; transform: scale(0.6) rotate(240deg); }
    }

    /* ── SCREENS ── */
    .screen {
      display: none;
      flex-direction: column;
      flex: 1;
      min-height: 100vh;
      position: relative;
      z-index: 1;
    }
    .screen.active { display: flex; }

    /* ── DS DIALOGUE BOX ── */
    .dlg-box {
      background: var(--bg-dialogue);
      border: 4px solid var(--border-outer);
      /* inner highlight ring + bottom drop shadow */
      box-shadow:
        inset 0 0 0 2px var(--border-inner),
        inset 0 2px 0 0 rgba(255,255,255,0.08),
        0 6px 0 0 var(--shadow);
      padding: 14px 16px;
      position: relative;
    }
    /* subtle top-left sheen */
    .dlg-box::after {
      content: '';
      position: absolute;
      top: 4px; left: 4px; right: 4px;
      height: 2px;
      background: linear-gradient(90deg, rgba(255,255,255,0.12), transparent);
      pointer-events: none;
    }

    /* ── BLINKING CURSOR ── */
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .cursor-blink {
      display: inline-block;
      color: var(--cursor-color);
      animation: blink 0.65s step-end infinite;
    }

    /* ── PIXEL BUTTONS (on-screen controls) ── */
    .ctrl-btn {
      font-family: var(--font);
      font-size: 7px;
      color: var(--text-main);
      background: var(--bg-panel);
      border: 0;
      /* pixel-border via outline + box-shadow trick */
      outline: 3px solid var(--border-outer);
      box-shadow:
        inset 0 0 0 1px var(--border-inner),
        3px 3px 0 0 var(--shadow);
      padding: 10px 14px;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      transition: transform 0.05s, box-shadow 0.05s;
      line-height: 1;
    }
    .ctrl-btn:active {
      transform: translate(3px, 3px);
      box-shadow: inset 0 0 0 1px var(--border-inner);
    }
    .ctrl-btn-a {
      background: var(--accent-purple);
      color: #fff;
    }
    .ctrl-btn-b {
      background: #1a1040;
    }

    .controls-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px 12px;
      flex-shrink: 0;
    }

    /* friends list pushes controls to bottom since the list is scrollable */
    #screen-friends .controls-row {
      margin-top: auto;
    }

    /* ══════════════════════════════════════════════
       HERO SCREEN
    ══════════════════════════════════════════════ */
    #screen-hero {
      align-items: center;
      gap: 0;
    }

    /* decorative pixel title frame */
    .title-frame {
      width: calc(100% - 32px);
      margin: 22px 16px 14px;
      padding: 12px 16px;
      background: var(--bg-panel);
      border: 3px solid var(--accent-purple);
      box-shadow:
        0 0 0 1px var(--bg-deep),
        0 0 0 4px var(--border-outer),
        inset 0 0 0 1px rgba(255,255,255,0.06);
      text-align: center;
      position: relative;
    }
    /* corner stars */
    .title-frame::before {
      content: '✦';
      position: absolute; top: -6px; left: 6px;
      color: var(--cursor-color); font-size: 10px;
      background: var(--bg-deep); padding: 0 2px;
    }
    .title-frame::after {
      content: '✦';
      position: absolute; top: -6px; right: 6px;
      color: var(--cursor-color); font-size: 10px;
      background: var(--bg-deep); padding: 0 2px;
    }

    .hero-title {
      font-size: 9px;
      line-height: 2;
      color: var(--accent-light);
      text-shadow:
        0 0 14px rgba(187, 136, 255, 0.7),
        2px 2px 0 var(--accent-purple);
    }

    .sprites-row {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 10px;
      padding: 10px 0;
    }

    .sprite {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      width: 96px;
      height: 96px;
    }

    #sprite-luxray {
      width: 77px;
      height: 77px;
    }

    .hero-dlg-wrap {
      width: calc(100% - 32px);
      margin: 0 16px;
    }

    .dialogue-text {
      font-size: 8px;
      line-height: 2.1;
      color: var(--text-main);
      min-height: 52px;
      white-space: pre-wrap;
    }

    /* ▶ continue indicator */
    .continue-arrow {
      display: block;
      text-align: right;
      color: var(--cursor-color);
      font-size: 8px;
      margin-top: 6px;
      animation: blink 0.65s step-end infinite;
      visibility: hidden;
    }

    /* YES/NO menu */
    .menu-options {
      display: none;
      flex-direction: column;
      gap: 6px;
      margin-top: 10px;
      border-top: 2px solid var(--border-outer);
      padding-top: 10px;
    }

    .menu-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 8px;
      padding: 4px 6px;
      color: var(--text-dim);
    }
    .menu-item.sel { color: var(--cursor-color); }

    .menu-cursor {
      color: var(--cursor-color);
      width: 10px;
      display: inline-block;
      animation: blink 0.65s step-end infinite;
    }

    /* ══════════════════════════════════════════════
       FRIENDS SCREEN
    ══════════════════════════════════════════════ */
    #screen-friends { gap: 0; }

    .screen-header {
      margin: 16px 16px 8px;
      padding: 10px 14px;
      background: var(--bg-dialogue);
      border: 3px solid var(--border-outer);
      box-shadow: inset 0 0 0 2px var(--border-inner);
      font-size: 7px;
      color: var(--accent-light);
      line-height: 1.9;
    }

    .friends-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 16px 8px;
      scrollbar-width: thin;
      scrollbar-color: var(--accent-purple) var(--bg-dark);
    }
    .friends-list::-webkit-scrollbar { width: 4px; }
    .friends-list::-webkit-scrollbar-track { background: var(--bg-dark); }
    .friends-list::-webkit-scrollbar-thumb { background: var(--accent-purple); }

    .friend-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 10px;
      margin-bottom: 4px;
      border: 2px solid transparent;
      cursor: pointer;
    }
    .friend-item.sel {
      background: rgba(119, 85, 221, 0.2);
      border-color: var(--accent-purple);
      box-shadow: inset 0 0 0 1px rgba(119,85,221,0.3);
    }

    .friend-avatar {
      width: 48px;
      height: 48px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 2px solid var(--border-outer);
      flex-shrink: 0;
      background: var(--bg-panel);
    }

    .friend-label {
      font-size: 8px;
      color: var(--text-main);
      flex: 1;
    }

    .friend-arrow {
      font-size: 8px;
      color: var(--cursor-color);
      animation: blink 0.65s step-end infinite;
      width: 12px;
    }

    .scroll-hint {
      text-align: center;
      font-size: 6px;
      color: var(--text-dim);
      padding: 4px;
      animation: blink 1.4s step-end infinite;
    }

    /* ══════════════════════════════════════════════
       PLAYBACK SCREEN
    ══════════════════════════════════════════════ */
    #screen-playback {
      padding: 20px 16px 12px;
      gap: 14px;
      align-items: flex-start;
      height: 100vh;
      overflow: hidden;
    }

    .playback-header {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
    }

    .playback-sprite {
      width: 64px;
      height: 64px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 2px solid var(--border-outer);
      background: var(--bg-panel);
      flex-shrink: 0;
    }

    .playback-info { display: flex; flex-direction: column; gap: 6px; }
    .playback-name {
      font-size: 10px;
      color: var(--accent-light);
      text-shadow: 0 0 10px rgba(187,136,255,0.5);
    }
    .playback-subtitle {
      font-size: 6px;
      color: var(--text-dim);
    }

    /* audio progress bar */
    .audio-row {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      font-size: 6px;
      color: var(--text-dim);
    }
    .audio-track {
      flex: 1;
      height: 5px;
      background: var(--border-outer);
      border: 1px solid var(--border-inner);
      position: relative;
      cursor: pointer;
    }
    .audio-fill {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      background: var(--accent-blue);
      width: 0%;
      transition: width 0.4s linear;
    }

    /* transcript box — hugs content, caps at available height, scrolls if very long */
    .transcript-box {
      width: 100%;
      flex: 0 0 auto;
      max-height: calc(100vh - 220px);
      background: var(--bg-dialogue);
      border: 4px solid var(--border-outer);
      box-shadow:
        inset 0 0 0 2px var(--border-inner),
        0 6px 0 0 var(--shadow);
      padding: 14px 16px;
      overflow-y: auto;
      position: relative;
    }
    .transcript-box::after {
      content: '';
      position: absolute;
      top: 4px; left: 4px; right: 4px;
      height: 2px;
      background: linear-gradient(90deg, rgba(255,255,255,0.1), transparent);
      pointer-events: none;
    }

    .transcript-text {
      font-size: 7px;
      line-height: 2.3;
      color: var(--text-main);
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

<!-- ── STAR BACKGROUND ── -->
<div id="stars"></div>

<!-- ── GAME COLUMN ── -->
<div id="game">

  <!-- ══════════════════════════════════════════════
       SCREEN 1 · HERO
  ══════════════════════════════════════════════ -->
  <div id="screen-hero" class="screen active">

    <div class="title-frame">
      <div class="hero-title">Happy 23rd<br>Birthday,<br>Nathan!</div>
    </div>

    <div class="sprites-row">
      <img
        id="sprite-nathan"
        src="nathan.png"
        alt="Nathan"
        class="sprite"
      />
      <img
        id="sprite-luxray"
        src="luxray.png"
        alt="Luxray"
        class="sprite"
      />
    </div>

    <div class="hero-dlg-wrap">
      <div class="dlg-box">
        <div id="dialogue-text" class="dialogue-text"></div>
        <span id="continue-arrow" class="continue-arrow">▼</span>

        <!-- YES / NO menu -->
        <div id="menu-options" class="menu-options">
          <div class="menu-item sel" id="menu-yes">
            <span class="menu-cursor" id="cur-yes">▶</span> YES
          </div>
          <div class="menu-item" id="menu-no">
            <span class="menu-cursor" id="cur-no">&nbsp;</span> NO
          </div>
        </div>
      </div>
    </div>

    <!-- on-screen D-pad (always visible; hide via media query if desired) -->
    <div class="controls-row" id="hero-controls">
      <button class="ctrl-btn" id="btn-hero-up">▲</button>
      <button class="ctrl-btn" id="btn-hero-down">▼</button>
      <button class="ctrl-btn ctrl-btn-a" id="btn-hero-a">A</button>
    </div>

  </div><!-- /screen-hero -->


  <!-- ══════════════════════════════════════════════
       SCREEN 2 · FRIENDS LIST
  ══════════════════════════════════════════════ -->
  <div id="screen-friends" class="screen">

    <div class="screen-header">▶ Who has a message for you?</div>

    <div class="friends-list" id="friends-list">
      <!-- populated by JS -->
    </div>

    <div class="scroll-hint">▼ more</div>

    <div class="controls-row">
      <button class="ctrl-btn" id="btn-f-up">▲</button>
      <button class="ctrl-btn" id="btn-f-down">▼</button>
      <button class="ctrl-btn ctrl-btn-a" id="btn-f-a">A</button>
      <button class="ctrl-btn ctrl-btn-b" id="btn-f-b">B</button>
    </div>

  </div><!-- /screen-friends -->


  <!-- ══════════════════════════════════════════════
       SCREEN 3 · MESSAGE PLAYBACK
  ══════════════════════════════════════════════ -->
  <div id="screen-playback" class="screen">

    <div class="playback-header">
      <img id="pb-sprite" src="" alt="" class="playback-sprite" />
      <div class="playback-info">
        <div class="playback-name" id="pb-name"></div>
        <div class="playback-subtitle">has a message for you!</div>
      </div>
    </div>

    <!-- audio bar -->
    <div class="audio-row">
      <span id="pb-status">▶ playing</span>
      <div class="audio-track" id="audio-track">
        <div class="audio-fill" id="audio-fill"></div>
      </div>
      <span id="pb-time">0:00</span>
    </div>
    <audio id="audio-player" preload="auto"></audio>
    <audio id="bgm" src="pokemon.mp3" loop preload="auto"></audio>

    <!-- transcript / dialogue -->
    <div class="transcript-box">
      <div id="transcript-text" class="transcript-text"></div>
    </div>

    <div class="controls-row">
      <button class="ctrl-btn ctrl-btn-b" id="btn-pb-b" style="padding:10px 22px;">← BACK</button>
      <button class="ctrl-btn ctrl-btn-a" id="btn-pb-replay" style="padding:10px 14px;">↺ REPLAY</button>
    </div>

  </div><!-- /screen-playback -->

</div><!-- /game -->


<script>
/* ════════════════════════════════════════════════════════════════
   FRIENDS DATA
   Each entry maps to: [name].png, [name].mp3, transcript_[name].txt
════════════════════════════════════════════════════════════════ */
const FRIENDS = [
  { name: 'Amanda',   file: 'amanda'   },
  { name: 'Misa',     file: 'misa'     },
  { name: 'Ariel',    file: 'ariel'    },
  { name: 'Bri',      file: 'bri'      },
  { name: 'Jackie',   file: 'jackie'   },
  { name: 'Liz',      file: 'liz'      },
  { name: 'Mel',      file: 'mel'      },
  { name: 'Jenna',    file: 'jenna'    },
  { name: 'Yingying', file: 'yingying' },
  { name: 'Taylor',   file: 'taylor'   },
  { name: 'Brian',    file: 'brian'    },
  { name: 'Alex',     file: 'alex'     },
  { name: 'Venus',    file: 'venus'    },
  { name: 'Katie',    file: 'katie'    },
];

/* ════════════════════════════════════════════════════════════════
   STATE
════════════════════════════════════════════════════════════════ */
let currentScreen  = 'hero';
let heroPhase      = 'typing'; // 'typing' | 'yesno' | 'busy'
let menuSel        = 0;        // 0 = YES, 1 = NO
let friendIdx      = 0;
let declineCount   = 0;
let twTimer        = null;     // active typewriter interval

/* ════════════════════════════════════════════════════════════════
   STAR + SPARKLE BACKGROUND — generated once on load
════════════════════════════════════════════════════════════════ */
(function buildBg() {
  const starsEl = document.getElementById('stars');

  // 90 twinkling star dots
  for (let i = 0; i < 90; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random() * 1.8 + 0.8;
    s.style.cssText =
      `width:${sz}px;height:${sz}px;` +
      `top:${(Math.random()*100).toFixed(2)}%;` +
      `left:${(Math.random()*100).toFixed(2)}%;` +
      `--dur:${(2 + Math.random()*5).toFixed(1)}s;` +
      `--delay:-${(Math.random()*5).toFixed(1)}s;` +
      `--lo:${(0.05 + Math.random()*0.15).toFixed(2)};` +
      `--hi:${(0.5 + Math.random()*0.5).toFixed(2)};`;
    starsEl.appendChild(s);
  }

  // 14 pixel sparkle glyphs scattered around
  const glyphs = ['✦','✧','⋆','✺','★','✸'];
  for (let i = 0; i < 14; i++) {
    const sp = document.createElement('div');
    sp.className = 'sparkle';
    sp.textContent = glyphs[Math.floor(Math.random() * glyphs.length)];
    sp.style.cssText =
      `top:${(Math.random()*95).toFixed(1)}%;` +
      `left:${(Math.random()*95).toFixed(1)}%;` +
      `--dur:${(3 + Math.random()*5).toFixed(1)}s;` +
      `--delay:-${(Math.random()*6).toFixed(1)}s;`;
    document.body.appendChild(sp);
  }
})();

/* ════════════════════════════════════════════════════════════════
   TYPEWRITER — animates text character by character
   el      : DOM element to write into (uses textContent)
   text    : full string to type
   speed   : ms per character
   onDone  : optional callback when complete
════════════════════════════════════════════════════════════════ */
function typewriter(el, text, speed, onDone) {
  if (twTimer) { clearInterval(twTimer); twTimer = null; }
  el.textContent = '';
  let i = 0;
  twTimer = setInterval(() => {
    el.textContent += text[i++];
    if (i >= text.length) {
      clearInterval(twTimer);
      twTimer = null;
      if (onDone) onDone();
    }
  }, speed);
}

/* skip remaining typewriter and show full text immediately */
function skipTypewriter(el, fullText, onDone) {
  if (twTimer) { clearInterval(twTimer); twTimer = null; }
  el.textContent = fullText;
  if (onDone) onDone();
}

/* ════════════════════════════════════════════════════════════════
   HERO SCREEN — dialogue + YES/NO navigation
════════════════════════════════════════════════════════════════ */
const dlgEl          = document.getElementById('dialogue-text');
const menuOptionsEl  = document.getElementById('menu-options');
const continueArrow  = document.getElementById('continue-arrow');
const curYes         = document.getElementById('cur-yes');
const curNo          = document.getElementById('cur-no');

const MSG_1       = 'Welcome to Nathan\'s\nbirthday site!';
const MSG_2       = 'You have messages\nfrom your friends.\nWould you like\nto hear them?';
const MSG_DECLINE = '...Are you sure?\nThey came a long\nway just for you.';
const MSG_DECLINE2= '...Really? That\'s\nokay. They\'ll wait\nas long as it takes.';

function startHero() {
  heroPhase = 'typing';
  menuOptionsEl.style.display = 'none';
  continueArrow.style.visibility = 'hidden';
  typewriter(dlgEl, MSG_1, 45, () => {
    // brief pause, then second line
    setTimeout(() => {
      typewriter(dlgEl, MSG_2, 42, () => {
        continueArrow.style.visibility = 'visible';
        setTimeout(showMenu, 500);
      });
    }, 700);
  });
}

function showMenu() {
  continueArrow.style.visibility = 'hidden';
  heroPhase = 'yesno';
  menuSel = 0;
  menuOptionsEl.style.display = 'flex';
  renderMenuCursor();
}

function renderMenuCursor() {
  curYes.textContent = menuSel === 0 ? '▶' : ' ';
  curNo.textContent  = menuSel === 1 ? '▶' : ' ';
  document.getElementById('menu-yes').classList.toggle('sel', menuSel === 0);
  document.getElementById('menu-no').classList.toggle('sel',  menuSel === 1);
}

/* move YES/NO cursor: dir = -1 (up) or 1 (down) */
function heroNav(dir) {
  if (heroPhase === 'typing') {
    // A/down while typing: skip to end of current message
    skipTypewriter(dlgEl, MSG_2, () => {
      continueArrow.style.visibility = 'visible';
      setTimeout(showMenu, 300);
    });
    return;
  }
  if (heroPhase !== 'yesno') return;
  menuSel = (menuSel + dir + 2) % 2;
  renderMenuCursor();
}

/* confirm current YES/NO selection */
function heroConfirm() {
  if (heroPhase === 'typing') {
    skipTypewriter(dlgEl, MSG_2, () => {
      continueArrow.style.visibility = 'visible';
      setTimeout(showMenu, 300);
    });
    return;
  }
  if (heroPhase !== 'yesno') return;

  if (menuSel === 0) {
    // YES → friend list
    goToFriends();
  } else {
    // NO → playful response, then re-prompt
    declineCount++;
    heroPhase = 'busy';
    menuOptionsEl.style.display = 'none';
    const decMsg = declineCount === 1 ? MSG_DECLINE : MSG_DECLINE2;
    typewriter(dlgEl, decMsg, 42, () => {
      setTimeout(() => {
        typewriter(dlgEl, MSG_2, 42, () => {
          continueArrow.style.visibility = 'visible';
          setTimeout(showMenu, 500);
        });
      }, 1000);
    });
  }
}

/* ════════════════════════════════════════════════════════════════
   FRIENDS SCREEN — scrollable icon list with cursor
════════════════════════════════════════════════════════════════ */
function buildFriendsList() {
  const list = document.getElementById('friends-list');
  list.innerHTML = '';

  FRIENDS.forEach((f, idx) => {
    const item = document.createElement('div');
    item.className = 'friend-item' + (idx === friendIdx ? ' sel' : '');
    item.dataset.index = idx;

    // avatar img with letter-fallback on error
    const img = document.createElement('img');
    img.src = `${f.file}.png`;
    img.alt = f.name;
    img.className = 'friend-avatar';
    img.onerror = () => {
      img.src = letterAvatar(f.name[0], 48);
    };

    const label = document.createElement('span');
    label.className = 'friend-label';
    label.textContent = f.name;

    const arrow = document.createElement('span');
    arrow.className = 'friend-arrow';
    arrow.textContent = idx === friendIdx ? '▶' : '';

    item.appendChild(img);
    item.appendChild(label);
    item.appendChild(arrow);

    // tap to select, second tap = confirm
    item.addEventListener('click', () => {
      if (friendIdx === idx) {
        friendsConfirm();
      } else {
        friendIdx = idx;
        buildFriendsList();
      }
    });

    list.appendChild(item);
  });

  // keep selected item in view
  const sel = list.querySelector('.friend-item.sel');
  if (sel) sel.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

/* generate a tiny SVG data-URI with a letter placeholder */
function letterAvatar(letter, size) {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}"><rect width="${size}" height="${size}" fill="#1a1555"/><text x="${size/2}" y="${size*0.68}" text-anchor="middle" fill="#bb88ff" font-size="${Math.floor(size*0.45)}" font-family="monospace">${letter}</text></svg>`;
  return 'data:image/svg+xml,' + encodeURIComponent(svg);
}

/* move friend cursor: dir = -1 or 1 */
function friendsNav(dir) {
  friendIdx = (friendIdx + dir + FRIENDS.length) % FRIENDS.length;
  buildFriendsList();
}

/* confirm selected friend → go to playback */
function friendsConfirm() {
  showPlayback(FRIENDS[friendIdx]);
}

function goToFriends() {
  showScreen('friends');
  buildFriendsList();
}

/* ════════════════════════════════════════════════════════════════
   PLAYBACK SCREEN — sprite, audio, transcript typewriter
════════════════════════════════════════════════════════════════ */
const audioEl   = document.getElementById('audio-player');
const audioFill = document.getElementById('audio-fill');
const pbStatus  = document.getElementById('pb-status');
const pbTime    = document.getElementById('pb-time');
const pbName    = document.getElementById('pb-name');
const pbSprite  = document.getElementById('pb-sprite');
const transcriptEl = document.getElementById('transcript-text');

/* update audio progress bar as it plays */
audioEl.addEventListener('timeupdate', () => {
  if (!audioEl.duration) return;
  const pct = (audioEl.currentTime / audioEl.duration) * 100;
  audioFill.style.width = pct.toFixed(1) + '%';
  const m = Math.floor(audioEl.currentTime / 60);
  const s = Math.floor(audioEl.currentTime % 60);
  pbTime.textContent = `${m}:${s.toString().padStart(2, '0')}`;
});

audioEl.addEventListener('ended', () => {
  pbStatus.textContent = '✓ done';
});

audioEl.addEventListener('error', () => {
  pbStatus.textContent = '⚠ no audio';
});

/* click audio track to seek */
document.getElementById('audio-track').addEventListener('click', (e) => {
  if (!audioEl.duration) return;
  const rect = e.currentTarget.getBoundingClientRect();
  audioEl.currentTime = ((e.clientX - rect.left) / rect.width) * audioEl.duration;
});

/* replay button */
document.getElementById('btn-pb-replay').addEventListener('click', () => {
  audioEl.currentTime = 0;
  audioEl.play().catch(() => { pbStatus.textContent = '▶ tap to play'; });
  pbStatus.textContent = '▶ playing';
});

async function showPlayback(friend) {
  showScreen('playback');

  // set name + sprite
  pbName.textContent = friend.name;
  pbSprite.src = `${friend.file}.png`;
  pbSprite.onerror = () => {
    pbSprite.src = letterAvatar(friend.name[0], 64);
  };

  // load + play audio
  audioEl.pause();
  audioEl.src = `${friend.file}.mp3`;
  audioFill.style.width = '0%';
  pbTime.textContent = '0:00';
  pbStatus.textContent = '▶ playing';
  audioEl.load();
  audioEl.play().catch(() => {
    pbStatus.textContent = '▶ tap to play';
  });

  // load transcript — graceful fallback if file missing
  transcriptEl.textContent = '';
  let text = null;
  try {
    const res = await fetch(`transcript_${friend.file}.txt`);
    if (res.ok) text = await res.text();
  } catch (_) { /* file not found */ }

  if (!text) {
    text = `${friend.name} recorded a message just for you.\n\nListen and know you are loved. ♥`;
  }

  // speed = finish typing at 90% of audio duration; fallback 28ms/char if no audio
  function startTyping() {
    const dur = audioEl.duration;
    const speed = (dur && isFinite(dur) && dur > 0 && text.length > 0)
      ? Math.max(12, (dur * 0.9 * 1000) / text.length)
      : 28;
    typewriter(transcriptEl, text, speed, null);
  }

  if (audioEl.duration && isFinite(audioEl.duration) && audioEl.duration > 0) {
    startTyping();
  } else {
    // wait for metadata so we know the duration before calculating speed
    audioEl.addEventListener('loadedmetadata', startTyping, { once: true });
    // fallback if audio is missing or metadata never fires
    setTimeout(() => { if (!transcriptEl.textContent) startTyping(); }, 3000);
  }
}

/* ════════════════════════════════════════════════════════════════
   SCREEN TRANSITIONS
════════════════════════════════════════════════════════════════ */
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(`screen-${name}`).classList.add('active');
  currentScreen = name;

  // stop audio + typewriter when leaving playback
  if (name !== 'playback') {
    audioEl.pause();
    audioEl.src = '';
    if (twTimer) { clearInterval(twTimer); twTimer = null; }
  }
}

function goBack() {
  if (currentScreen === 'playback') {
    showScreen('friends');
    buildFriendsList();
  } else if (currentScreen === 'friends') {
    showScreen('hero');
    // restore prompt state
    heroPhase = 'yesno';
    menuSel = 0;
    dlgEl.textContent = MSG_2;
    continueArrow.style.visibility = 'hidden';
    menuOptionsEl.style.display = 'flex';
    renderMenuCursor();
  }
}

/* ════════════════════════════════════════════════════════════════
   KEYBOARD NAVIGATION
   Arrow keys move cursor, Enter/Z confirms, Escape/X goes back
════════════════════════════════════════════════════════════════ */
document.addEventListener('keydown', (e) => {
  if (currentScreen === 'hero') {
    if (e.key === 'ArrowUp')                          heroNav(-1);
    else if (e.key === 'ArrowDown')                   heroNav(1);
    else if (e.key === 'Enter' || e.key === 'z' || e.key === 'Z') heroConfirm();
  }

  if (currentScreen === 'friends') {
    if (e.key === 'ArrowUp')                          friendsNav(-1);
    else if (e.key === 'ArrowDown')                   friendsNav(1);
    else if (e.key === 'Enter' || e.key === 'z' || e.key === 'Z') friendsConfirm();
    else if (e.key === 'Escape' || e.key === 'x' || e.key === 'X') goBack();
  }

  if (currentScreen === 'playback') {
    if (e.key === 'Escape' || e.key === 'x' || e.key === 'X') goBack();
  }
});

/* ════════════════════════════════════════════════════════════════
   ON-SCREEN BUTTON WIRING
════════════════════════════════════════════════════════════════ */
document.getElementById('btn-hero-up').addEventListener('click',   () => heroNav(-1));
document.getElementById('btn-hero-down').addEventListener('click', () => heroNav(1));
document.getElementById('btn-hero-a').addEventListener('click',    () => heroConfirm());

document.getElementById('btn-f-up').addEventListener('click',   () => friendsNav(-1));
document.getElementById('btn-f-down').addEventListener('click', () => friendsNav(1));
document.getElementById('btn-f-a').addEventListener('click',    () => friendsConfirm());
document.getElementById('btn-f-b').addEventListener('click',    () => goBack());

document.getElementById('btn-pb-b').addEventListener('click', () => goBack());

/* ════════════════════════════════════════════════════════════════
   INIT
════════════════════════════════════════════════════════════════ */
window.addEventListener('load', startHero);

/* ════════════════════════════════════════════════════════════════
   BACKGROUND MUSIC
   iOS Safari ignores audio.volume (read-only on iOS), so we route
   through a Web Audio GainNode which iOS DOES respect.
════════════════════════════════════════════════════════════════ */
const bgm    = document.getElementById('bgm');
let   bgmCtx = null;  // AudioContext, created once on first interaction

function startBgm() {
  // Wire up Web Audio gain graph once — this is what actually controls
  // volume on iOS (audio.volume is a no-op there)
  if (!bgmCtx) {
    try {
      bgmCtx       = new (window.AudioContext || window.webkitAudioContext)();
      const src    = bgmCtx.createMediaElementSource(bgm);
      const gain   = bgmCtx.createGain();
      gain.gain.value = 0.1;          // 10% — audible but not overpowering
      src.connect(gain);
      gain.connect(bgmCtx.destination);
    } catch (_) {
      bgm.volume = 0.1;               // fallback for browsers without Web Audio
    }
  }
  if (bgmCtx && bgmCtx.state === 'suspended') bgmCtx.resume();
  bgm.play().catch(() => {});
}

window.addEventListener('load', startBgm);
document.addEventListener('click',   () => { if (bgm.paused) startBgm(); }, { once: true });
document.addEventListener('keydown', () => { if (bgm.paused) startBgm(); }, { once: true });
</script>
